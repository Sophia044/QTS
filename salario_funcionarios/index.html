<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de Cadastro de Funcionários — CRUD completo com localStorage" />
  <title>CRUD</title>
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <span>Cadastro de Funcionários</span>
      <button id="new" onclick="openModal()">
        <i class='bx bx-plus'></i> Incluir
      </button>
    </div>

    <!-- Tabela -->
    <div class="divTable">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Função</th>
            <th>Salário</th>
            <th class="acao">Editar</th>
            <th class="acao">Excluir</th>
          </tr>
        </thead>
        <tbody>
          <!-- Preenchido pelo JS -->
        </tbody>
      </table>
    </div>

    <!-- Modal -->
    <div class="modal-container">
      <div class="modal">
        <form>
          <div class="field">
            <label for="m-nome">Nome</label>
            <input id="m-nome" type="text" placeholder="Nome completo" required />
          </div>
          <div class="field">
            <label for="m-funcao">Função</label>
            <input id="m-funcao" type="text" placeholder="Ex: Analista, Dev..." required />
          </div>
          <div class="field">
            <label for="m-salario">Salário</label>
            <input id="m-salario" type="number" placeholder="Ex: 3500" required />
          </div>
          <button id="btnSalvar" type="button">
            <i class='bx bx-save'></i> Salvar
          </button>
        </form>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
