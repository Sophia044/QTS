<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="login-container" id="loginView">
        <form id="loginForm" class="login-form">
            <h2>Acesso Restrito</h2>
            <p>Faça login para continuar</p>
            <div class="input-group">
                <i class='bx bx-user'></i>
                <input type="text" id="l-login" placeholder="Usuário" required />
            </div>
            <div class="input-group">
                <i class='bx bx-lock-alt'></i>
                <input type="password" id="l-senha" placeholder="Senha" required />
            </div>
            <p id="loginError" class="error-msg"></p>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div class="container" id="appView" style="display: none;">
        <div class="header">
            <span>Cadastro de Funcionários</span>
            <button onclick="openModal()" id="new">Incluir <i class='bx bx-plus'></i></button>
        </div>
        <div class="divTable">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Função</th>
                        <th>Salário</th>
                        <th class="acao">Editar</th>
                        <th class="acao">Excluir</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
        <div class="modal-container">
            <div class="modal">
                <form>
                    <label for="m-nome">Nome</label>
                    <input id="m-nome" type="text" required />
                    <label for="m-funcao">Função</label>
                    <input id="m-funcao" type="text" required />
                    <label for="m-salario">Salário</label>
                    <input id="m-salario" type="number" required />
                    <button id="btnSalvar">Salvar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
